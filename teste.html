<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Teste Game Icons</title><link rel="stylesheet" href="https://rwschwayer.github.io/rpg-css/game-icons.css"><style>body{background:#111;color:#eee;font-family:Arial;padding:30px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:20px}.card{background:#1b1b1b;border:1px solid #333;padding:18px;text-align:center;border-radius:8px}.game-icon{font-size:48px;display:block;margin-bottom:10px;color:#fff}.name{font-size:12px;color:#aaa}</style></head><body><h1>Teste Game Icons</h1><p>Se aparecerem quadrados, o CSS carregou, mas a fonte dos ícones não carregou.</p><div class="grid"><div class="card"><i class="game-icon game-icon-dragon-head"></i><div class="name">dragon-head</div></div><div class="card"><i class="game-icon game-icon-wizard-face"></i><div class="name">wizard-face</div></div><div class="card"><i class="game-icon game-icon-unicorn"></i><div class="name">unicorn</div></div><div class="card"><i class="game-icon game-icon-fireball"></i><div class="name">fireball</div></div><div class="card"><i class="game-icon game-icon-flame"></i><div class="name">flame</div></div><div class="card"><i class="game-icon game-icon-burning-eye"></i><div class="name">burning-eye</div></div><div class="card"><i class="game-icon game-icon-shield"></i><div class="name">shield</div></div><div class="card"><i class="game-icon game-icon-magic-shield"></i><div class="name">magic-shield</div></div><div class="card"><i class="game-icon game-icon-crossed-swords"></i><div class="name">crossed-swords</div></div><div class="card"><i class="game-icon game-icon-crystal-wand"></i><div class="name">crystal-wand</div></div><div class="card"><i class="game-icon game-icon-raven"></i><div class="name">raven</div></div><div class="card"><i class="game-icon game-icon-wolf-head"></i><div class="name">wolf-head</div></div></div></body></html>
